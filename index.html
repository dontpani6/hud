<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
body{
  margin:0;
  background:transparent;
  font-family:Arial, sans-serif;
}

.hud{
  width:1100px; /* УЖЕ */
  height:90px;
  margin:0 auto;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px; /* место под таймер */
}

/* TEAM BLOCK */
.team{
  width:480px;
  height:70px;
  border-radius:14px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  box-sizing:border-box;
  background:rgba(0,0,0,.85);
  border:3px solid rgba(255,255,255,.18);
}

/* COLOR STRIP */
.team.left::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:8px;
  background:#0a84ff;
  border-radius:14px 0 0 14px;
}
.team.right::before{
  content:"";
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  width:8px;
  background:#ff3b3b;
  border-radius:0 14px 14px 0;
}

.inner{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:40px;
  height:40px;
  border-radius:6px;
  overflow:hidden;
}
.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  font-weight:900;
  font-size:28px; /* КРУПНЕЕ */
  color:white;
  text-transform:uppercase;
}

/* MAP CELLS */
.mpRow{
  margin-top:6px;
  display:flex;
  gap:6px;
}

.mp{
  width:40px;  /* ШИРОКИЕ */
  height:14px;
  border-radius:4px;
  background:#111;
  border:2px solid rgba(255,255,255,.25);
}

.blue{ background:#0a84ff; }
.red{ background:#ff3b3b; }

/* SCORE */
.score{
  width:60px;
  height:48px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  color:white;
  background:rgba(0,0,0,.7);
  border:2px solid rgba(255,255,255,.25);
}
</style>
</head>

<body>
<div class="hud">

  <!-- LEFT -->
  <div class="team left">
    <div class="inner">
      <div class="logo"><img id="logo1"></div>
      <div>
        <div class="name" id="name1">TEAM A</div>
        <div class="mpRow" id="mp1"></div>
      </div>
    </div>
    <div class="score" id="score1">0</div>
  </div>

  <!-- RIGHT -->
  <div class="team right">
    <div class="score" id="score2">0</div>
    <div class="inner">
      <div style="text-align:right;">
        <div class="name" id="name2">TEAM B</div>
        <div class="mpRow" id="mp2" style="justify-content:flex-end;"></div>
      </div>
      <div class="logo"><img id="logo2"></div>
    </div>
  </div>

</div>

<script>
const DATA_URL = "ВСТАВЬ_СВОЮ_CSV_ССЫЛКУ";

function parseCSV(text){
  const lines=text.trim().split("\n");
  const obj={};
  for(const l of lines){
    const p=l.split(",");
    obj[p[0]]=p[1];
  }
  return obj;
}

function renderMP(id,pattern,color){
  const el=document.getElementById(id);
  el.innerHTML="";
  const p=(pattern||"00").padEnd(2,"0");
  for(let i=0;i<2;i++){
    const d=document.createElement("div");
    d.className="mp"+(p[i]==="1"?" "+color:"");
    el.appendChild(d);
  }
}

async function load(){
  const r=await fetch(DATA_URL+"&t="+Date.now());
  const t=await r.text();
  const o=parseCSV(t);

  document.getElementById("name1").textContent=o.team1_name||"TEAM A";
  document.getElementById("name2").textContent=o.team2_name||"TEAM B";
  document.getElementById("score1").textContent=o.team1_score||"0";
  document.getElementById("score2").textContent=o.team2_score||"0";

  if(o.team1_logo)document.getElementById("logo1").src=o.team1_logo;
  if(o.team2_logo)document.getElementById("logo2").src=o.team2_logo;

  renderMP("mp1",o.team1_mp,"blue");
  renderMP("mp2",o.team2_mp,"red");
}

load();
setInterval(load,1000);
</script>
</body>
</html>
