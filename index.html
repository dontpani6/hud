<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root{
    --blue:#0a84ff; --blue2:#075cb6;
    --red:#ff3b3b;  --red2:#b41a1a;
    --panelTop: rgba(18,24,34,.98);
    --panelBot: rgba(10,13,18,.98);
    --stroke: rgba(255,255,255,.18);
    --shadow: 0 10px 26px rgba(0,0,0,.45);
  }

  body{ margin:0; background:transparent; font-family: Arial, system-ui, sans-serif; }

  .hud{
    width:1180px;
    height:92px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .wrap{
    width:1180px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  /* место под таймер в игре */
  .spacer{
    width:260px;  /* меняй под свой таймер */
    height:74px;
  }

  .team{
    width:460px;
    height:74px;
    border-radius:16px;
    background: linear-gradient(180deg, var(--panelTop), var(--panelBot));
    border:2px solid var(--stroke);
    box-shadow: var(--shadow);
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    box-sizing:border-box;
  }

  .team.left::before{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(90deg, rgba(10,132,255,.55), rgba(0,0,0,0) 60%);
    pointer-events:none;
  }
  .team.right::before{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(270deg, rgba(255,59,59,.55), rgba(0,0,0,0) 60%);
    pointer-events:none;
  }

  .team.left::after{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:8px;
    background:var(--blue);
    border-radius:16px 0 0 16px;
  }
  .team.right::after{
    content:"";
    position:absolute; right:0; top:0; bottom:0; width:8px;
    background:var(--red);
    border-radius:0 16px 16px 0;
  }

  .inner{
    position:relative; z-index:2;
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }

  .logo{
    width:46px; height:46px;
    border-radius:10px;
    overflow:hidden;
    background:rgba(255,255,255,.08);
    border:2px solid rgba(255,255,255,.18);
    flex:0 0 auto;
  }
  .logo img{ width:100%; height:100%; object-fit:cover; display:block; }

  .texts{ min-width:0; }

  .name{
    color:#fff;
    font-weight:1000;
    font-size:26px;
    letter-spacing:.6px;
    text-transform:uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:300px;
    line-height:1;
  }

  .mpRow{
    margin-top:8px;
    display:flex;
    gap:8px;
  }
  .mp{
    width:54px;
    height:14px;
    border-radius:5px;
    background:#0a0d12;
    border:2px solid rgba(255,255,255,.18);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.35);
  }
  .mp.blue{
    background: linear-gradient(180deg, var(--blue), var(--blue2));
    border-color: rgba(255,255,255,.25);
  }
  .mp.red{
    background: linear-gradient(180deg, var(--red), var(--red2));
    border-color: rgba(255,255,255,.25);
  }

  .score{
    position:relative; z-index:2;
    width:66px; height:52px;
    border-radius:12px;
    border:2px solid rgba(255,255,255,.20);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:1000;
    letter-spacing:.5px;
  }
  .team.left .score{  background: linear-gradient(180deg, var(--blue), var(--blue2)); }
  .team.right .score{ background: linear-gradient(180deg, var(--red), var(--red2)); }
</style>
</head>

<body>
  <div class="hud">
    <div class="wrap">

      <div class="team left">
        <div class="inner">
          <div class="logo"><img id="logo1" alt=""></div>
          <div class="texts">
            <div class="name" id="name1">TEAM A</div>
            <div class="mpRow" id="mp1"></div>
          </div>
        </div>
        <div class="score" id="score1">0</div>
      </div>

      <div class="spacer"></div>

      <div class="team right">
        <div class="score" id="score2">0</div>
        <div class="inner" style="flex-direction:row-reverse;">
          <div class="logo"><img id="logo2" alt=""></div>
          <div class="texts" style="text-align:right;">
            <div class="name" id="name2">TEAM B</div>
            <div class="mpRow" id="mp2" style="justify-content:flex-end;"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

<script>
  // ВСТАВЬ СЮДА URL веб-приложения Apps Script (…/exec)
  const API_URL = "https://script.google.com/macros/s/AKfycbzLF-gX2lqds1UBgDrLFTZkpzup_K_8WWCWnjwgDVAQIRqHOUBPtEbugVESBy5U2EstyQ/exec";

  let lastApplied = "";
  let lastLogo1 = "";
  let lastLogo2 = "";

  function clean(s){
    return (s ?? "").toString().trim();
  }

  function renderMP(containerId, pattern, colorClass){
    const el = document.getElementById(containerId);
    const p = clean(pattern || "00").replace(/[^01]/g,"").padEnd(2,"0").slice(0,2);

    // обновляем только если реально изменилось, чтобы не мигало
    const next = `mp:${p}:${colorClass}`;
    if (el.dataset.state === next) return;
    el.dataset.state = next;

    el.innerHTML = "";
    for(let i=0;i<2;i++){
      const d = document.createElement("div");
      d.className = "mp" + (p[i] === "1" ? (" " + colorClass) : "");
      el.appendChild(d);
    }
  }

  function snapshot(o){
    const keys = ["team1_name","team2_name","team1_score","team2_score","team1_logo","team2_logo","team1_mp","team2_mp"];
    return keys.map(k => `${k}=${o[k] ?? ""}`).join("|");
  }

  function apply(o){
    const s1 = o.team1_score ?? "0";
    const s2 = o.team2_score ?? "0";

    // тексты — ставим только если поменялись
    const n1 = o.team1_name || "TEAM A";
    const n2 = o.team2_name || "TEAM B";
    if (document.getElementById("name1").textContent !== n1) document.getElementById("name1").textContent = n1;
    if (document.getElementById("name2").textContent !== n2) document.getElementById("name2").textContent = n2;

    if (document.getElementById("score1").textContent !== s1) document.getElementById("score1").textContent = s1;
    if (document.getElementById("score2").textContent !== s2) document.getElementById("score2").textContent = s2;

    renderMP("mp1", o.team1_mp, "blue");
    renderMP("mp2", o.team2_mp, "red");

    const l1 = clean(o.team1_logo);
    const l2 = clean(o.team2_logo);

    // лого — только если ссылка поменялась
    if (l1 && l1 !== lastLogo1){
      lastLogo1 = l1;
      document.getElementById("logo1").src = l1;
    }
    if (l2 && l2 !== lastLogo2){
      lastLogo2 = l2;
      document.getElementById("logo2").src = l2;
    }
  }

  async function load(){
    try{
      const url = API_URL + (API_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
      const res = await fetch(url, { cache:"no-store" });
      const o = await res.json();

      const snap = snapshot(o);
      if (snap === lastApplied) return;

      // с Apps Script обычно не "флапает", поэтому применяем сразу
      lastApplied = snap;
      apply(o);

    } catch(e){
      console.log("HUD load error:", e);
    }
  }

  load();
  setInterval(load, 500);
</script>
</body>
</html>
