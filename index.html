<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
body{margin:0;background:transparent;font-family:Arial,sans-serif;}

.hud{
  width:1920px;
  height:110px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:10px;
  box-sizing:border-box;
}

.row{
  width:1800px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* TEAM BLOCK */
.team{
  width:880px;
  height:78px;
  border-radius:12px;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  box-sizing:border-box;
  background:rgba(0,0,0,.85);
  border:3px solid rgba(255,255,255,.18);
}

/* COLORS */
.team.left::before{
  content:"";
  position:absolute;
  inset:-40px -160px;
  background:linear-gradient(90deg,#0a84ff,transparent);
  transform:skewX(-18deg);
}
.team.right::before{
  content:"";
  position:absolute;
  inset:-40px -160px;
  background:linear-gradient(270deg,#ff3b3b,transparent);
  transform:skewX(18deg);
}

.inner{
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:46px;
  height:46px;
  border-radius:8px;
  overflow:hidden;
}
.logo img{width:100%;height:100%;object-fit:cover;}

.name{
  font-weight:900;
  font-size:26px;
  color:white;
  text-transform:uppercase;
}

/* MAP POINT CELLS */
.mpRow{
  margin-top:6px;
  display:flex;
  gap:6px;
}
.mp{
  width:20px;
  height:12px;
  border-radius:3px;
  background:#111;
  border:2px solid rgba(255,255,255,.25);
}
.blue{ background:#0a84ff; }
.red{ background:#ff3b3b; }

.score{
  position:relative;
  z-index:2;
  width:54px;
  height:44px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:900;
  color:white;
  background:rgba(0,0,0,.6);
  border:2px solid rgba(255,255,255,.25);
}
</style>
</head>

<body>
<div class="hud">
  <div class="row">

    <!-- LEFT -->
    <div class="team left">
      <div class="inner">
        <div class="logo"><img id="logo1"></div>
        <div>
          <div class="name" id="name1">TEAM A</div>
          <div class="mpRow" id="mp1"></div>
        </div>
      </div>
      <div class="score" id="score1">0</div>
    </div>

    <!-- RIGHT -->
    <div class="team right">
      <div class="score" id="score2">0</div>
      <div class="inner">
        <div style="text-align:right;">
          <div class="name" id="name2">TEAM B</div>
          <div class="mpRow" id="mp2" style="justify-content:flex-end;"></div>
        </div>
        <div class="logo"><img id="logo2"></div>
      </div>
    </div>

  </div>
</div>

<script>
const DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTgOPRE9yy_FZ2fGaLpHVbU31_6ljU8seCSnk9v6xgMtywnvX7qlH-0OWrgu2qxkRWT1P0VZAzsyq5/pub?gid=0&single=true&output=csv";

function clean(s){
  return (s ?? "").toString().replace(/^\uFEFF/,"").trim();
}

function parseKV(text){
  const lines = text.split("\n").map(clean).filter(Boolean);
  const obj={};
  for(const l of lines){
    const p=l.split(",");
    obj[p[0]]=p.slice(1).join(",");
  }
  return obj;
}

function renderMP(id, pattern, color){
  const el=document.getElementById(id);
  el.innerHTML="";
  const p=(pattern||"00").padEnd(2,"0");
  for(let i=0;i<2;i++){
    const d=document.createElement("div");
    d.className="mp"+(p[i]==="1"?" "+color:"");
    el.appendChild(d);
  }
}

async function load(){
  const r=await fetch(DATA_URL+"&t="+Date.now());
  const txt=await r.text();
  const o=parseKV(txt);

  document.getElementById("name1").textContent=o.team1_name||"TEAM A";
  document.getElementById("name2").textContent=o.team2_name||"TEAM B";
  document.getElementById("score1").textContent=o.team1_score||"0";
  document.getElementById("score2").textContent=o.team2_score||"0";

  if(o.team1_logo)document.getElementById("logo1").src=o.team1_logo;
  if(o.team2_logo)document.getElementById("logo2").src=o.team2_logo;

  renderMP("mp1",o.team1_mp,"blue");
  renderMP("mp2",o.team2_mp,"red");
}

load();
setInterval(load,1000);
</script>
</body>
</html>
